services:
  vllm:
    image: vllm/vllm-openai:latest
    container_name: vllm
    ports:
      - "8000:8000"
    command: >
      --model Qwen/Qwen2.5-3B-Instruct
      --api-key token-abc123
      --max-model-len 512
      --quantization bitsandbytes
      --load-format bitsandbytes
      --gpu-memory-utilization 0.95
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]